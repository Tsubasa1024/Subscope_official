<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ランキング | SUBSCOPE</title>

  <link rel="icon" href="S.png" type="image/png">
  <!-- Canonical -->
  <link rel="canonical" href="https://www.subscope.jp/ranking.html">

  <!-- OGP -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="SUBSCOPE">
  <meta property="og:title" content="ランキング | SUBSCOPE">
  <meta property="og:description" content="SUBSCOPEで人気の記事をランキング形式でまとめるページ。迷ったらまずここから。">
  <meta property="og:url" content="https://www.subscope.jp/ranking.html">
  <meta property="og:image" content="https://www.subscope.jp/ogp-default-v3.png">
  <meta property="og:image:secure_url" content="https://www.subscope.jp/ogp-default-v3.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ランキング | SUBSCOPE">
  <meta name="twitter:description" content="SUBSCOPEで人気の記事をランキング形式でまとめるページ。迷ったらまずここから。">
  <meta name="twitter:image" content="https://www.subscope.jp/ogp-default-v3.png">

  <style>
    :root{
      --color-bg:#fff;--color-bg-secondary:#f5f5f7;--color-text-main:#1d1d1f;
      --color-text-gray:#86868b;--color-border:#d2d2d7;--color-accent:#000;
      --font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      --transition-hover:.4s cubic-bezier(.25,.8,.25,1);
      --transition-fade:.8s cubic-bezier(.2,.8,.2,1);
      --container-width:1080px;--spacing-section:80px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;overflow-x:hidden}
    body{font-family:var(--font-family);background:var(--color-bg);color:var(--color-text-main);-webkit-font-smoothing:antialiased;line-height:1.5}
    a{text-decoration:none;color:inherit}
    ul{list-style:none}
    .container{max-width:var(--container-width);margin:0 auto;padding:0 24px;width:100%}

    .reveal{opacity:0;transform:translateY(40px);transition:opacity var(--transition-fade),transform var(--transition-fade)}
    .reveal.active{opacity:1;transform:translateY(0)}

    /* Header */
    .fixed-header{position:fixed;top:0;left:0;width:100%;z-index:150;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.06)}
    .top-header{max-width:var(--container-width);margin:0 auto;padding:12px 24px 16px;display:flex;justify-content:space-between;align-items:center;position:relative}
    .nav-center{position:absolute;left:50%;transform:translateX(-50%)}
    .header-logo{font-size:1.6rem;font-weight:700;letter-spacing:-.03em}

    .search-wrapper{width:280px;position:relative}
    .search-input{width:100%;padding:10px 40px 10px 44px;border-radius:999px;border:1px solid rgba(0,0,0,.1);
      background:rgba(255,255,255,.8);backdrop-filter:blur(20px);font-size:.9rem;outline:none;box-shadow:0 4px 20px rgba(0,0,0,.05)}
    .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--color-text-gray);pointer-events:none;z-index:2}
    .clear-btn{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:18px;color:#999;cursor:pointer;display:none;user-select:none}

    .search-results-container{position:fixed;top:72px;left:0;right:0;max-width:var(--container-width);margin:0 auto;padding:0 24px 16px;z-index:130}
    #searchResults{margin-top:8px;max-height:380px;overflow-y:auto;display:none}
    .search-item{display:flex;gap:12px;padding:10px 12px;border-radius:16px;background:#fff;margin-bottom:8px;cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,.03);transition:.2s}
    .search-item:hover{background:#f5f5f7;transform:translateY(-1px);box-shadow:0 8px 18px rgba(0,0,0,.06)}
    .search-item img{width:64px;height:64px;border-radius:12px;object-fit:cover;flex-shrink:0}
    .search-item h3{font-size:.95rem;margin-bottom:4px}
    .search-item p{
      font-size:.8rem;color:var(--color-text-gray);
      display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;
      overflow:hidden;text-overflow:ellipsis;
    }

    .menu-btn{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border:1px solid rgba(0,0,0,.1);
      padding:12px 24px;border-radius:999px;font-size:.9rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
      box-shadow:0 4px 20px rgba(0,0,0,.05)}
    .menu-icon-lines{display:flex;flex-direction:column;gap:4px}
    .menu-line{width:16px;height:2px;border-radius:999px;background:var(--color-text-main)}
    .menu-btn{color:var(--color-text-main);-webkit-appearance:none;appearance:none}
    .menu-btn,.menu-btn *{color:var(--color-text-main)!important;-webkit-tap-highlight-color:transparent}

    .nav-overlay{position:fixed;top:72px;right:40px;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);
      padding:20px;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.2);border:1px solid rgba(0,0,0,.05);
      transform:translateY(-20px);opacity:0;visibility:hidden;transition:.3s cubic-bezier(.2,.8,.2,1);z-index:140;min-width:200px}
    .nav-overlay.open{transform:translateY(0);opacity:1;visibility:visible}
    .nav-link{display:block;padding:10px 16px;border-radius:12px;font-size:.95rem;font-weight:500}
    .nav-link:hover{background:var(--color-bg-secondary)}

    /* ===== Ranking hero ===== */
    .ranking-hero { padding-top: 100px; padding-bottom: 32px; }
    .ranking-title { font-size: 2rem; font-weight: 700; letter-spacing: -.03em; margin-bottom: 16px; }

    /* ===== Period toggle ===== */
    .period-toggle { display: flex; flex-wrap: wrap; gap: 8px; }
    .period-btn {
      padding: 7px 18px; border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.12);
      font-size: .85rem; font-weight: 500; background: #fff;
      cursor: pointer; color: var(--color-text-main);
      transition: background .2s, color .2s, border-color .2s;
    }
    .period-btn.active { background: #000; color: #fff !important; border-color: #000; }

    /* ===== Ranking section ===== */
    .ranking-section { padding: 8px 0 80px; }

    /* ===== Period switch animation ===== */
    #ranking-top3, #ranking-rest {
      transition: opacity .22s ease, transform .22s ease;
    }
    #ranking-top3.is-switching, #ranking-rest.is-switching {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }

    /* ===== Skeleton loading ===== */
    @keyframes skeleton-shimmer {
      0%   { background-position: -800px 0; }
      100% { background-position:  800px 0; }
    }
    .sk {
      background: linear-gradient(90deg, #f0f0f0 25%, #e6e6e6 50%, #f0f0f0 75%);
      background-size: 1600px 100%;
      animation: skeleton-shimmer 1.4s ease-in-out infinite;
      border-radius: 6px;
    }
    .sk-card { display: flex; flex-direction: column; border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,0,0,0.06); background: #fff; }
    .sk-card .sk-img  { width: 100%; aspect-ratio: 16/9; background: #ebebeb; flex-shrink: 0; }
    .sk-card .sk-body { padding: 14px 16px 0; flex: 1; }
    .sk-card .sk-l    { height: 11px; margin-bottom: 8px; }
    .sk-card .sk-footer { padding: 12px 16px 14px; border-top: 1px solid rgba(0,0,0,0.05); margin-top: 10px; }
    .sk-row { display: flex; align-items: center; gap: 14px; background: #fff; padding: 14px 18px; }
    .sk-row .sk-num  { width: 22px; height: 16px; flex-shrink: 0; border-radius: 4px; }
    .sk-row .sk-thumb { width: 72px; height: 54px; border-radius: 10px; flex-shrink: 0; background: #ebebeb; }
    .sk-row .sk-info  { flex: 1; min-width: 0; }
    .sk-row .sk-l     { height: 12px; margin-bottom: 6px; }

    /* ===== Top 3 grid ===== */
    .ranking-top3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
      margin-bottom: 16px;
    }

    /* ===== Ranking card (top 3) ===== */
    .ranking-card {
      display: flex; flex-direction: column;
      border-radius: 20px; background: #fff;
      border: 1px solid rgba(0,0,0,0.06); overflow: hidden;
      cursor: pointer;
      transition: box-shadow .4s cubic-bezier(.22,1,.36,1), transform .4s cubic-bezier(.22,1,.36,1);
    }
    .ranking-card:hover { box-shadow: 0 20px 48px rgba(0,0,0,.10); transform: translateY(-4px); }
    .ranking-card .card-image-wrap { width: 100%; aspect-ratio: 16/9; overflow: hidden; position: relative; background: #f0f0f0; flex-shrink: 0; }
    .ranking-card .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .65s cubic-bezier(.22,1,.36,1); }
    .ranking-card:hover .card-image-wrap img { transform: scale(1.05); }
    .ranking-card .card-body { padding: 14px 16px 0; display: flex; flex-direction: column; flex-grow: 1; }
    .ranking-card .card-service { font-size: 10px; font-weight: 700; color: var(--color-text-gray); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .07em; }
    .ranking-card .card-title { font-size: 14px; font-weight: 700; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--color-text-main); }
    .ranking-card .card-desc { font-size: 12px; color: var(--color-text-gray); line-height: 1.55; margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .ranking-card .card-footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 14px; margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.05); }
    .ranking-card .card-date { font-size: 10px; color: var(--color-text-gray); }
    .ranking-card .card-arrow { width: 24px; height: 24px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .22s, border-color .22s, transform .22s; }
    .ranking-card:hover .card-arrow { background: #000; border-color: #000; transform: translateX(2px); }
    .ranking-card:hover .card-arrow svg { stroke: #fff; }

    /* ===== Rank badge (image overlay) ===== */
    .rank-badge {
      position: absolute; top: 10px; left: 10px; z-index: 2;
      width: 28px; height: 28px; border-radius: 999px;
      font-size: .8rem; font-weight: 700; color: #fff;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .rank-badge.rank-1 { background: #c8980a; }
    .rank-badge.rank-2 { background: #7a7a82; }
    .rank-badge.rank-3 { background: #8c5530; }
    .rank-badge.rank-other { background: rgba(0,0,0,0.55); }

    /* ===== Rest list (4位以降) ===== */
    .ranking-rest {
      display: flex; flex-direction: column; gap: 1px;
      background: rgba(0,0,0,0.05);
      border-radius: 20px; overflow: hidden;
      margin-bottom: 40px;
    }
    .ranking-row {
      display: flex; align-items: center; gap: 14px;
      background: #fff; padding: 14px 18px;
      cursor: pointer; transition: background .15s;
    }
    .ranking-row:first-child { border-radius: 20px 20px 0 0; }
    .ranking-row:last-child  { border-radius: 0 0 20px 20px; }
    .ranking-row:only-child  { border-radius: 20px; }
    .ranking-row:hover { background: #f9f9fb; }
    .ranking-row-num { font-size: .9rem; font-weight: 700; color: var(--color-text-gray); width: 22px; text-align: right; flex-shrink: 0; }
    .ranking-row-thumb { width: 72px; height: 54px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: #f0f0f0; }
    .ranking-row-info { flex: 1; min-width: 0; }
    .ranking-row-title { font-size: .9rem; font-weight: 600; line-height: 1.4; color: var(--color-text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px; }
    .ranking-row-meta { font-size: .75rem; color: var(--color-text-gray); }

    /* ===== CTA ===== */
    .ranking-cta-wrapper { text-align: center; margin-top: 8px; }
    .ranking-cta-btn {
      display: inline-block; background: #000; color: #fff;
      padding: 14px 38px; border-radius: 40px;
      font-size: 1rem; font-weight: 600;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      transition: transform .2s, background .2s;
    }
    .ranking-cta-btn:hover { background: #333; transform: translateY(-2px); }

    /* ===== Footer ===== */
    .footer { background: #f5f5f7; padding: 40px 0; border-top: 1px solid var(--color-border); margin-top: 60px; }
    .footer-container { max-width: 1080px; margin: 0 auto; text-align: center; }
    .footer-links { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; }
    .footer-links a { font-size: 15px; transition: opacity .3s; }
    .footer-links a:hover { opacity: .6; }
    .footer-copy { color: #86868b; font-size: 13px; }

    /* ===== Mobile ===== */
    @media (max-width: 767px) {
      .top-header { padding: 10px 16px; }
      .search-wrapper { width: 44px; height: 44px; border-radius: 999px; border: 2px solid #e5e5e7; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: .35s; }
      .search-input { border: none; box-shadow: none; padding: 0; background: transparent; opacity: 0; pointer-events: none; transition: .25s; }
      .search-icon { left: 50%; top: 50%; transform: translate(-50%,-50%); width: 22px; height: 22px; color: #a7a7aa; }
      .fixed-header.search-open .nav-center { display: none; }
      .fixed-header.search-open .nav-left { flex: 1 1 auto; }
      .fixed-header.search-open .search-wrapper { width: 100%; border: none; box-shadow: none; justify-content: flex-start; background: transparent; }
      .fixed-header.search-open .search-input { opacity: 1; pointer-events: auto; padding: 10px 40px 10px 44px; border-radius: 999px; border: 1px solid rgba(0,0,0,.1); background: #fff; box-shadow: 0 8px 25px rgba(0,0,0,.15); }
      .fixed-header.search-open .search-icon { left: 16px; top: 50%; transform: translateY(-50%); }
      .menu-btn > span { display: none; }
      .menu-btn { width: 44px; height: 44px; padding: 0; border-radius: 999px; justify-content: center; }
      .ranking-hero { padding-top: 88px; padding-bottom: 24px; }
      .ranking-title { font-size: 1.6rem; }
      .ranking-top3 { grid-template-columns: 1fr; gap: 14px; }
      .ranking-row-title { white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
      .footer-links { gap: 24px; flex-wrap: wrap; }
    }
    @media (min-width: 768px) and (max-width: 1024px) {
      .ranking-top3 { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
    }

    .side-sponsor,.between-sponsor,.ad-card{display:none !important;}

    .period-toggle,.period-btn,.period-btn *{-webkit-tap-highlight-color:transparent}
    .period-btn{color:var(--color-text-main);-webkit-text-fill-color:var(--color-text-main);outline:none}
    .period-btn:not(.active):focus,.period-btn:not(.active):active{color:var(--color-text-main);-webkit-text-fill-color:var(--color-text-main)}
    .period-btn.active{background:#000;color:#fff!important;-webkit-text-fill-color:#fff!important;border-color:#000}
    .period-btn.active:focus,.period-btn.active:active{color:#fff!important;-webkit-text-fill-color:#fff!important}

    /* reveal 無効化（今の方針維持） */
    .reveal{opacity:1!important;transform:none!important;transition:none!important}
    .reveal.active{opacity:1!important;transform:none!important}

    /* =========================
       ✅ Loading（ランキング専用）
       ========================= */
    .loader-wrap{
      position:fixed; inset:0;
      display:grid; place-items:center;
      background:#fff;
      z-index:99999;
    }
    .loader-breath{
      font:700 14px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      letter-spacing:.18em;
      text-transform:uppercase;
      opacity:.45;
      animation:breath 1.4s ease-in-out infinite;
    }
    @keyframes breath{
      0%,100%{opacity:.35;transform:scale(.98)}
      50%{opacity:.9;transform:scale(1.02)}
    }
    #loader{opacity:1;transition:opacity .35s ease}
    #loader.is-hide{opacity:0;pointer-events:none}
  </style>

  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9FCHPHJTVE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9FCHPHJTVE');
  </script>
</head>

<body data-page="ranking">
  <!-- Loading -->
  <div class="loader-wrap" id="loader" aria-label="Loading">
    <div class="loader-breath">SUBSCOPE</div>
  </div>

  <!-- Header -->
  <div class="fixed-header">
    <div class="top-header">
      <div class="nav-left">
        <div class="search-wrapper">
          <input type="text" class="search-input" id="searchInput" placeholder="">
          <span class="clear-btn" id="clear-btn">×</span>
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
      </div>

      <div class="nav-center">
        <a href="index.html" class="header-logo-link"><img src="S__1_.png" alt="SUBSCOPE" height="40" width="auto"></a>
      </div>

      <div class="nav-right">
        <button class="menu-btn" id="menuBtn" type="button" aria-label="メニュー">
          <div class="menu-icon-lines"><span class="menu-line"></span><span class="menu-line"></span></div>
          <span>Menu</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Menu -->
  <div class="nav-overlay" id="nav-overlay">
    <ul class="nav-list">
      <li><a href="index.html" class="nav-link" onclick="toggleMenu(false)">トップ</a></li>
      <li><a href="all.html" class="nav-link" onclick="toggleMenu(false)">すべての記事</a></li>
      <li><a href="ranking.html" class="nav-link" onclick="toggleMenu(false)">ランキング</a></li>
      <li><a href="sns.html" class="nav-link" onclick="toggleMenu(false)">SNS</a></li>
    </ul>
  </div>

  <div class="search-results-container"><div id="searchResults"></div></div>

  <!-- Hero -->
  <section class="ranking-hero">
    <div class="container">
      <div class="reveal active">
        <h1 class="ranking-title">ランキング</h1>
        <div class="period-toggle" id="period-toggle">
          <button class="period-btn" data-period="day">DAY</button>
          <button class="period-btn" data-period="week">WEEK</button>
          <button class="period-btn" data-period="month">MONTH</button>
          <button class="period-btn active" data-period="all">ALL</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Content -->
  <section class="ranking-section">
    <div class="container">
      <div class="ranking-top3 reveal" id="ranking-top3"></div>
      <div class="ranking-rest reveal" id="ranking-rest"></div>

      <div class="ranking-cta-wrapper reveal">
        <a href="all.html" class="ranking-cta-btn">すべての記事を見る</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-links">
        <a href="privacy.html">プライバシーポリシー</a>
        <a href="terms.html">利用規約</a>
        <a href="company.html">運営会社</a>
      </div>
      <p class="footer-copy">© 2025 SUBSCOPE. All rights reserved.</p>
    </div>
  </footer>

  <script>
    function toggleMenu(force) {
      const nav = document.getElementById("nav-overlay");
      if (!nav) return;
      if (force === true) nav.classList.add("open");
      else if (force === false) nav.classList.remove("open");
      else nav.classList.toggle("open");
    }

    document.addEventListener("click", (e) => {
      const nav = document.getElementById("nav-overlay");
      const btn = document.querySelector(".menu-btn");
      if (!nav || !btn) return;
      if (!nav.classList.contains("open")) return;
      if (!nav.contains(e.target) && !btn.contains(e.target)) nav.classList.remove("open");
    });

    // ✅ ranking.js から呼ぶ
    window.hideLoader = function () {
      const el = document.getElementById("loader");
      if (!el) return;
      el.classList.add("is-hide");
      el.addEventListener("transitionend", () => el.remove(), { once: true });
      setTimeout(() => el.remove(), 600);
    };

    // 保険：10秒で強制解除
    setTimeout(() => window.hideLoader?.(), 10000);
  </script>
<script>
  window.__USE_EXTERNAL_RANKING__ = true;
</script>
