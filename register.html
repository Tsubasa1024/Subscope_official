<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会員登録 | SUBSCOPE</title>
  <meta name="description" content="SUBSCOPEに会員登録して、記事へのいいね・保存・コメントができるようになります。">
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">

  <style>
    :root {
      --color-bg: #fff;
      --color-bg-secondary: #f5f5f7;
      --color-text-main: #1d1d1f;
      --color-text-gray: #86868b;
      --color-border: #d2d2d7;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --ease-out-expo: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100vh; }
    body {
      font-family: var(--font-family);
      background: var(--color-bg-secondary);
      color: var(--color-text-main);
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column; min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    /* ===== ヘッダー ===== */
    .site-header {
      background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding: 16px 24px; text-align: center;
    }
    .site-header a { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.03em; }

    /* ===== メインコンテンツ ===== */
    .page-main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 16px;
    }

    .auth-card {
      width: 100%; max-width: 440px;
      background: #fff; border-radius: 28px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      border: 1px solid rgba(0,0,0,0.05);
      animation: cardIn 0.4s var(--ease-out-expo) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-card-logo {
      text-align: center; margin-bottom: 28px;
    }
    .auth-card-logo span {
      font-size: 1.3rem; font-weight: 700; letter-spacing: -0.03em;
    }

    .auth-card-title {
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em;
      margin-bottom: 6px; text-align: center;
    }
    .auth-card-sub {
      font-size: 0.875rem; color: var(--color-text-gray);
      text-align: center; margin-bottom: 28px; line-height: 1.6;
    }

    /* ===== ソーシャルログインボタン ===== */
    .social-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .social-btn {
      width: 100%; padding: 13px 16px; border-radius: 12px;
      font-size: 0.93rem; font-weight: 600; font-family: var(--font-family);
      cursor: pointer; border: 1px solid rgba(0,0,0,0.14);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.18s, opacity 0.18s;
      -webkit-tap-highlight-color: transparent;
      background: #fff; color: #1d1d1f;
    }
    .social-btn:hover { background: #f5f5f7; }
    .social-btn:active { opacity: 0.8; }
    .social-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== 区切り線 ===== */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; color: var(--color-text-gray);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(0,0,0,0.1);
    }

    /* ===== フォーム ===== */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: var(--color-text-main); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.12); font-size: 0.95rem;
      font-family: var(--font-family); outline: none; background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none; appearance: none;
    }
    .form-input:focus {
      border-color: #1d1d1f;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }
    .form-input::placeholder { color: #c0c0c5; }
    .form-hint {
      font-size: 0.78rem; color: var(--color-text-gray);
      margin-top: 4px; display: block;
    }

    .submit-btn {
      width: 100%; padding: 14px; border-radius: 12px;
      background: #1d1d1f; color: #fff; border: none;
      font-size: 0.95rem; font-weight: 600; font-family: var(--font-family);
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== エラー / 成功 ===== */
    .alert {
      padding: 12px 16px; border-radius: 12px; font-size: 0.875rem;
      margin-bottom: 16px; display: none; line-height: 1.5;
    }
    .alert-error { background: #fff0f0; color: #c0392b; border: 1px solid rgba(192,57,43,0.15); }
    .alert-success { background: #f0faf5; color: #0f6e56; border: 1px solid rgba(15,110,86,0.15); }
    .alert.show { display: block; }

    /* ===== 同意事項 ===== */
    .terms-agree {
      display: flex; gap: 10px; align-items: flex-start;
      margin-bottom: 20px; margin-top: 4px;
    }
    .terms-agree input[type="checkbox"] {
      margin-top: 2px; width: 16px; height: 16px; flex-shrink: 0; cursor: pointer;
    }
    .terms-agree label {
      font-size: 0.82rem; color: var(--color-text-gray); line-height: 1.5; cursor: pointer;
    }
    .terms-agree a { color: var(--color-text-main); text-decoration: underline; }

    /* ===== リンク ===== */
    .auth-links { margin-top: 24px; text-align: center; }
    .auth-links p { font-size: 0.875rem; color: var(--color-text-gray); }
    .auth-links a {
      color: var(--color-text-main); font-weight: 600;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .auth-links a:hover { opacity: 0.7; }

    /* ===== フッター ===== */
    .site-footer {
      padding: 24px; text-align: center;
      font-size: 0.8rem; color: var(--color-text-gray);
    }

    /* ===== モバイル ===== */
    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; border-radius: 24px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/index.html">SUBSCOPE</a>
  </header>

  <main class="page-main">
    <div class="auth-card">
      <div class="auth-card-logo">
        <span>SUBSCOPE</span>
      </div>

      <h1 class="auth-card-title">会員登録</h1>
      <p class="auth-card-sub">
        登録すると記事へのいいね・保存・<br>コメントができるようになります
      </p>

      <div class="alert alert-error" id="errorAlert"></div>
      <div class="alert alert-success" id="successAlert"></div>

      <!-- ソーシャル登録 -->
      <div class="social-btns">
        <button class="social-btn social-btn-google" id="googleLoginBtn" type="button">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
          </svg>
          Google で登録
        </button>

      </div>

      <div class="divider">またはメールアドレスで登録</div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="nameInput">ニックネーム</label>
          <input
            class="form-input"
            type="text"
            id="nameInput"
            name="name"
            placeholder="SUBSCOPEユーザー"
            autocomplete="nickname"
            maxlength="30"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="emailInput">メールアドレス</label>
          <input
            class="form-input"
            type="email"
            id="emailInput"
            name="email"
            placeholder="example@mail.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="passwordInput">パスワード</label>
          <input
            class="form-input"
            type="password"
            id="passwordInput"
            name="password"
            placeholder="8文字以上のパスワード"
            autocomplete="new-password"
            required
          />
          <span class="form-hint">8文字以上で設定してください</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="passwordConfirmInput">パスワード（確認）</label>
          <input
            class="form-input"
            type="password"
            id="passwordConfirmInput"
            name="passwordConfirm"
            placeholder="パスワードを再入力"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="terms-agree">
          <input type="checkbox" id="agreeCheck" />
          <label for="agreeCheck">
            <a href="/terms.html" target="_blank">利用規約</a> および
            <a href="/privacy.html" target="_blank">プライバシーポリシー</a>
            に同意します
          </label>
        </div>

        <button class="submit-btn" type="submit" id="submitBtn">会員登録する</button>
      </form>

      <div class="auth-links">
        <p>すでにアカウントをお持ちの方は <a href="/login.html">ログイン</a></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <a href="/privacy.html">プライバシーポリシー</a> &nbsp;·&nbsp;
    <a href="/terms.html">利用規約</a>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="/auth.js"></script>

  <script>
    var form           = document.getElementById('registerForm');
    var nameInput      = document.getElementById('nameInput');
    var emailInput     = document.getElementById('emailInput');
    var passInput      = document.getElementById('passwordInput');
    var passConfirm    = document.getElementById('passwordConfirmInput');
    var agreeCheck     = document.getElementById('agreeCheck');
    var submitBtn      = document.getElementById('submitBtn');
    var googleBtn      = document.getElementById('googleLoginBtn');
    var errorAlert     = document.getElementById('errorAlert');
    var successAlert   = document.getElementById('successAlert');

    // ログイン済みならリダイレクト（認証状態確定後に判定）
    Auth.onReady(function (user) {
      if (user) {
        window.location.replace('/index.html');
      }
    });

    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.add('show');
      successAlert.classList.remove('show');
    }
    function clearAlerts() {
      errorAlert.classList.remove('show');
      successAlert.classList.remove('show');
    }
    function onSuccess() {
      successAlert.textContent = '登録が完了しました！トップページに移動します...';
      successAlert.classList.add('show');
      setTimeout(function () {
        var next = new URLSearchParams(location.search).get('next');
        window.location.replace(next || '/index.html');
      }, 800);
    }

    // メール + パスワード 新規登録
    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      clearAlerts();

      var name    = nameInput.value.trim();
      var email   = emailInput.value.trim();
      var password = passInput.value;
      var confirm  = passConfirm.value;

      if (!name)                    return showError('ニックネームを入力してください');
      if (password !== confirm)     return showError('パスワードが一致しません');
      if (!agreeCheck.checked)      return showError('利用規約とプライバシーポリシーに同意してください');

      submitBtn.disabled    = true;
      submitBtn.textContent = '登録中...';

      try {
        await Auth.register(email, password, name);
        onSuccess();
      } catch (err) {
        showError(err.message || '登録に失敗しました');
        submitBtn.disabled    = false;
        submitBtn.textContent = '会員登録する';
      }
    });

    // Google で登録
    googleBtn.addEventListener('click', async function () {
      clearAlerts();
      if (!agreeCheck.checked) return showError('利用規約とプライバシーポリシーに同意してください');
      googleBtn.disabled = true;
      try {
        await Auth.loginWithGoogle();
        onSuccess();
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          showError(err.message || 'Google 登録に失敗しました');
        }
        googleBtn.disabled = false;
      }
    });

  </script>

</body>
</html>
